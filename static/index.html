<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Slack</title>
  <script>
    (function () {
      try {
        var raw = localStorage.getItem("messages-chat-contact");
        var appearance = "auto";
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && (parsed.appearance === "light" || parsed.appearance === "dark" || parsed.appearance === "auto")) {
            appearance = parsed.appearance;
          }
        }
        var theme = appearance === "auto"
          ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : appearance;
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <style>
    :root, [data-theme="dark"] {
      color-scheme: dark;
      --page-bg: #1a1d21;
      --sidebar-bg: #19171d;
      --sidebar-text: #d1d2d3;
      --sidebar-muted: #ababad;
      --sidebar-hover: rgba(255, 255, 255, 0.06);
      --sidebar-active: #1164a3;
      --workspace: #350d36;
      --main-bg: #1a1d21;
      --header-bg: #1a1d21;
      --text: #d1d2d3;
      --text-strong: #f8f8f8;
      --text-secondary: #ababad;
      --separator: rgba(255, 255, 255, 0.1);
      --hover: rgba(255, 255, 255, 0.04);
      --composer-border: #565856;
      --composer-bg: #222529;
      --input-bg: #222529;
      --msg-hover: rgba(255, 255, 255, 0.03);
      --link: #1d9bd1;
      --accent: #007a5a;
      --modal-bg: #1a1d21;
      --modal-overlay: rgba(0, 0, 0, 0.55);
      --card-bg: #222529;
      --search-bg: rgba(255, 255, 255, 0.08);
      --segment-bg: rgba(255, 255, 255, 0.08);
      --segment-active: #222529;
      --you-label: #e01e5a;
    }

    [data-theme="light"] {
      color-scheme: light;
      --page-bg: #ffffff;
      --sidebar-bg: #3f0e40;
      --sidebar-text: #ffffff;
      --sidebar-muted: rgba(255, 255, 255, 0.7);
      --sidebar-hover: rgba(255, 255, 255, 0.1);
      --sidebar-active: #1164a3;
      --workspace: #350d36;
      --main-bg: #ffffff;
      --header-bg: #ffffff;
      --text: #1d1c1d;
      --text-strong: #1d1c1d;
      --text-secondary: #616061;
      --separator: rgba(29, 28, 29, 0.13);
      --hover: rgba(29, 28, 29, 0.04);
      --composer-border: #868686;
      --composer-bg: #ffffff;
      --input-bg: #ffffff;
      --msg-hover: rgba(29, 28, 29, 0.04);
      --link: #1264a3;
      --accent: #007a5a;
      --modal-bg: #ffffff;
      --modal-overlay: rgba(0, 0, 0, 0.4);
      --card-bg: #f8f8f8;
      --search-bg: rgba(255, 255, 255, 0.15);
      --segment-bg: #f2f2f2;
      --segment-active: #ffffff;
      --you-label: #e01e5a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--page-bg);
      color: var(--text);
      font-family: "Slack-Lato", "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI",
        Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 0;
    }

    .sidebar {
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid rgba(0, 0, 0, 0.2);
    }

    .workspace {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.02em;
    }

    .sidebar-search {
      padding: 10px 12px 6px;
    }

    .sidebar-search input {
      width: 100%;
      height: 30px;
      border: 0;
      border-radius: 6px;
      outline: none;
      background: var(--search-bg);
      color: inherit;
      padding: 0 10px;
      font: inherit;
      font-size: 13px;
    }

    .sidebar-search input::placeholder { color: var(--sidebar-muted); }

    .section-label {
      padding: 14px 16px 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--sidebar-muted);
      text-transform: none;
    }

    .conv-list { flex: 1; overflow-y: auto; padding: 0 8px 12px; }

    .conv {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: default;
      color: var(--sidebar-text);
      font-size: 15px;
    }

    .conv:hover { background: var(--sidebar-hover); }
    .conv.active {
      background: var(--sidebar-active);
      color: #fff;
    }

    .conv-avatar {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      background: linear-gradient(145deg, #e01e5a, #ecb22e);
      background-size: cover;
      background-position: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .conv-avatar.green { background: linear-gradient(145deg, #2eb67d, #007a5a); }
    .conv-avatar.orange { background: linear-gradient(145deg, #ecb22e, #e01e5a); }
    .conv-avatar.has-photo { color: transparent; font-size: 0; }

    .conv-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .presence {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2eb67d;
      margin-left: auto;
      flex-shrink: 0;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--main-bg);
    }

    .chat-header {
      height: 49px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--separator);
      background: var(--header-bg);
    }

    .chat-person {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border-radius: 6px;
      padding: 4px 6px;
      margin-left: -6px;
    }

    .chat-person:hover { background: var(--hover); }

    .chat-person .name {
      font-size: 17px;
      font-weight: 800;
      color: var(--text-strong);
      letter-spacing: -0.02em;
    }

    .header-actions button {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 15px;
    }

    .header-actions button:hover { background: var(--hover); color: var(--text); }

    .thread {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 8px;
      scroll-behavior: smooth;
    }

    .day {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 20px 12px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 700;
    }

    .day::before, .day::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--separator);
    }

    .msg {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 8px;
      padding: 8px 20px;
      animation: rise 0.18s ease-out;
    }

    .msg:hover { background: var(--msg-hover); }

    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      background: linear-gradient(145deg, #e01e5a, #ecb22e);
      background-size: cover;
      background-position: center;
      overflow: hidden;
      margin-top: 2px;
    }

    .msg-avatar.you { background: linear-gradient(145deg, #36c5f0, #2eb67d); }
    .msg-avatar.has-photo { color: transparent; font-size: 0; }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }

    .msg-author {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-strong);
    }

    .msg-author.you { color: var(--you-label); }

    .msg-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .msg-body {
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--text);
    }

    .attach-card {
      margin-top: 8px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-bg);
      border: 1px solid var(--separator);
      max-width: 320px;
    }

    .attach-card img {
      display: block;
      width: 100%;
      max-height: 220px;
      object-fit: cover;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
    }

    .file-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: #1264a3;
      color: white;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .file-icon.pdf { background: #e01e5a; }

    .file-name { font-size: 13px; font-weight: 600; }
    .file-size { font-size: 12px; color: var(--text-secondary); }

    .typing-row {
      padding: 4px 20px 10px 68px;
      font-size: 13px;
      color: var(--text-secondary);
      min-height: 24px;
    }

    .typing-row .dots span {
      display: inline-block;
      width: 4px;
      height: 4px;
      margin: 0 1px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-row .dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-row .dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-3px); opacity: 1; }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .composer-wrap {
      flex-shrink: 0;
      padding: 0 20px 16px;
    }

    .pending {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 0 8px;
    }

    .pending:empty { display: none; }

    .chip {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--separator);
      background: var(--card-bg);
      max-width: 140px;
    }

    .chip img {
      display: block;
      width: 140px;
      height: 90px;
      object-fit: cover;
    }

    .chip .file-row { padding: 8px 10px; min-width: 120px; }

    .chip .remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 0;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }

    .composer {
      border: 1px solid var(--composer-border);
      border-radius: 8px;
      background: var(--composer-bg);
      padding: 8px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .composer:focus-within { border-color: var(--text-secondary); }

    #message {
      width: 100%;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      line-height: 1.4;
      max-height: 140px;
      min-height: 24px;
      padding: 4px 2px;
    }

    #message::placeholder { color: var(--text-secondary); }

    .composer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 0;
      background: transparent;
      color: var(--text-secondary);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .icon-btn:hover { background: var(--hover); color: var(--text); }

    #send {
      height: 28px;
      padding: 0 12px;
      border-radius: 4px;
      border: 0;
      background: var(--accent);
      color: white;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      opacity: 0.4;
      pointer-events: none;
    }

    #send.active {
      opacity: 1;
      pointer-events: auto;
    }

    #fileInput, #avatarInput { display: none; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      display: none;
      place-items: center;
      z-index: 50;
      padding: 20px;
    }

    .modal-backdrop.open { display: grid; }

    .modal {
      width: min(400px, 100%);
      background: var(--modal-bg);
      border: 1px solid var(--separator);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--text-strong);
    }

    .modal-avatar-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .modal-avatar-preview {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 700;
      color: white;
      background: linear-gradient(145deg, #e01e5a, #ecb22e);
      background-size: cover;
      background-position: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .modal-avatar-preview.has-photo { color: transparent; font-size: 0; }

    .modal-avatar-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .modal label, .style-field > span {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .modal input[type="text"] {
      width: 100%;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--separator);
      background: var(--search-bg);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
    }

    .modal input[type="text"]:focus { border-color: var(--link); }

    .style-field { margin-bottom: 14px; }

    .style-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 3px;
      border-radius: 8px;
      background: var(--segment-bg);
      border: 1px solid var(--separator);
    }

    .style-switch.three { grid-template-columns: 1fr 1fr 1fr; }

    .style-switch button {
      appearance: none;
      border: 0;
      border-radius: 6px;
      height: 32px;
      background: transparent;
      color: var(--text-secondary);
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .style-switch button.active {
      background: var(--segment-active);
      color: var(--text-strong);
      box-shadow: 0 0.5px 1px rgba(0, 0, 0, 0.12);
    }

    .style-hint {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--text-secondary);
    }

    .btn-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      height: 32px;
      padding: 0 14px;
      border-radius: 6px;
      border: 0;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn.ghost {
      background: transparent;
      color: var(--text-secondary);
    }

    .btn.ghost:hover { background: var(--hover); color: var(--text); }

    .btn.primary {
      background: var(--accent);
      color: white;
    }

    .btn.secondary {
      background: var(--segment-bg);
      color: var(--text);
    }

    .btn.secondary:hover { background: var(--hover); }

    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div class="app" role="application" aria-label="Slack">
    <aside class="sidebar">
      <div class="workspace">Workspace</div>
      <div class="sidebar-search">
        <input type="search" placeholder="Search" readonly tabindex="-1" />
      </div>
      <div class="section-label">Direct messages</div>
      <div class="conv-list">
        <div class="conv active">
          <div class="conv-avatar" id="sidebarAvatar">A</div>
          <div class="conv-name" id="sidebarName">Alex</div>
          <span class="presence" aria-hidden="true"></span>
        </div>
        <div class="conv">
          <div class="conv-avatar green">S</div>
          <div class="conv-name">Sam</div>
        </div>
        <div class="conv">
          <div class="conv-avatar orange">J</div>
          <div class="conv-name">Jordan</div>
        </div>
      </div>
    </aside>

    <section class="main">
      <header class="chat-header">
        <div class="chat-person" id="openContact" title="Edit profile" role="button" tabindex="0">
          <div class="name" id="headerName">Alex</div>
        </div>
        <div class="header-actions">
          <button type="button" id="detailsBtn" title="Edit profile" aria-label="Edit profile">ⓘ</button>
        </div>
      </header>

      <main class="thread" id="thread" aria-live="polite">
        <div class="day">Today</div>
      </main>

      <div class="typing-row" id="typingRow" hidden></div>

      <div class="composer-wrap">
        <div class="pending" id="pending"></div>
        <form class="composer" id="composer" autocomplete="off">
          <textarea id="message" rows="1" placeholder="Message Alex"></textarea>
          <div class="composer-bar">
            <button class="icon-btn" type="button" id="attachBtn" title="Attach" aria-label="Attach file">+</button>
            <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.doc,.docx,.md,.csv" />
            <button id="send" type="submit">Send</button>
          </div>
        </form>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="contactModal" role="dialog" aria-modal="true" aria-labelledby="contactModalTitle">
    <div class="modal">
      <h2 id="contactModalTitle">Edit profile</h2>
      <div class="modal-avatar-row">
        <div class="modal-avatar-preview" id="modalAvatar">A</div>
        <div class="modal-avatar-actions">
          <button type="button" class="btn secondary" id="changePhotoBtn">Choose photo…</button>
          <button type="button" class="btn ghost" id="clearPhotoBtn">Use initial</button>
        </div>
      </div>
      <label for="contactNameInput">Display name</label>
      <input type="text" id="contactNameInput" maxlength="40" placeholder="Display name" />
      <div class="style-field">
        <span>Appearance</span>
        <div class="style-switch three" role="group" aria-label="Appearance">
          <button type="button" id="appearanceLight" data-appearance="light">Light</button>
          <button type="button" id="appearanceDark" data-appearance="dark">Dark</button>
          <button type="button" id="appearanceAuto" data-appearance="auto" class="active">Auto</button>
        </div>
        <p class="style-hint" id="appearanceHint">Matches your system: light by day, dark at night.</p>
      </div>
      <div class="style-field">
        <span>Message style</span>
        <div class="style-switch" role="group" aria-label="Message style">
          <button type="button" id="styleAssistant" data-style="assistant">AI style</button>
          <button type="button" id="styleFriend" data-style="friend" class="active">Friend chat</button>
        </div>
        <p class="style-hint" id="styleHint">Casual texts — short, natural, no bullet lists.</p>
      </div>
      <div class="btn-row">
        <button type="button" class="btn ghost" id="cancelContactBtn">Cancel</button>
        <button type="button" class="btn primary" id="saveContactBtn">Save</button>
      </div>
    </div>
  </div>
  <input type="file" id="avatarInput" accept="image/*" />

  <script>
    const thread = document.getElementById("thread");
    const form = document.getElementById("composer");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("send");
    const attachBtn = document.getElementById("attachBtn");
    const fileInput = document.getElementById("fileInput");
    const pendingEl = document.getElementById("pending");
    const contactModal = document.getElementById("contactModal");
    const contactNameInput = document.getElementById("contactNameInput");
    const modalAvatar = document.getElementById("modalAvatar");
    const avatarInput = document.getElementById("avatarInput");
    const typingRow = document.getElementById("typingRow");

    const STORAGE_KEY = "messages-chat-contact";
    const DEFAULT_CONTACT = { name: "Alex", avatarDataUrl: null, style: "friend", appearance: "auto" };
    const STYLE_HINTS = {
      assistant: "Clearer answers — can use dashes and bullet points.",
      friend: "Casual texts — short, natural, no bullet lists."
    };
    const APPEARANCE_HINTS = {
      light: "Always use bright Slack look.",
      dark: "Always use dark Slack look.",
      auto: "Matches your system: light by day, dark at night."
    };

    let contact = loadContact();
    let draftAvatar = contact.avatarDataUrl;
    let draftStyle = contact.style || "friend";
    let draftAppearance = contact.appearance || "auto";
    let mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    const pendingFiles = [];
    const history = [
      { role: "assistant", content: "Hey — you free for a sec?", images: [] },
      { role: "assistant", content: "Need a quick take on something.", images: [] }
    ];
    let busy = false;

    function loadContact() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...DEFAULT_CONTACT };
        const parsed = JSON.parse(raw);
        const style = parsed.style === "assistant" ? "assistant" : "friend";
        const appearance = ["light", "dark", "auto"].includes(parsed.appearance)
          ? parsed.appearance
          : "auto";
        return {
          name: (parsed.name || DEFAULT_CONTACT.name).trim() || DEFAULT_CONTACT.name,
          avatarDataUrl: parsed.avatarDataUrl || null,
          style,
          appearance
        };
      } catch {
        return { ...DEFAULT_CONTACT };
      }
    }

    function resolvedTheme(appearance) {
      if (appearance === "light" || appearance === "dark") return appearance;
      return mediaQuery.matches ? "dark" : "light";
    }

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", resolvedTheme(contact.appearance || "auto"));
    }

    function saveContact(next) {
      contact = next;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(contact));
      applyContact();
      applyTheme();
    }

    function setStyleButtons(style) {
      draftStyle = style === "assistant" ? "assistant" : "friend";
      document.getElementById("styleAssistant").classList.toggle("active", draftStyle === "assistant");
      document.getElementById("styleFriend").classList.toggle("active", draftStyle === "friend");
      document.getElementById("styleHint").textContent = STYLE_HINTS[draftStyle];
    }

    function setAppearanceButtons(appearance) {
      draftAppearance = ["light", "dark", "auto"].includes(appearance) ? appearance : "auto";
      document.getElementById("appearanceLight").classList.toggle("active", draftAppearance === "light");
      document.getElementById("appearanceDark").classList.toggle("active", draftAppearance === "dark");
      document.getElementById("appearanceAuto").classList.toggle("active", draftAppearance === "auto");
      document.getElementById("appearanceHint").textContent = APPEARANCE_HINTS[draftAppearance];
    }

    function initialFor(name) {
      return ((name || "?").trim()[0] || "?").toUpperCase();
    }

    function paintAvatar(el, name, avatarDataUrl) {
      if (avatarDataUrl) {
        el.classList.add("has-photo");
        el.style.backgroundImage = `url("${avatarDataUrl}")`;
        el.textContent = "";
      } else {
        el.classList.remove("has-photo");
        el.style.backgroundImage = "";
        el.textContent = initialFor(name);
      }
    }

    function formatTime(date = new Date()) {
      return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function applyContact() {
      document.getElementById("sidebarName").textContent = contact.name;
      document.getElementById("headerName").textContent = contact.name;
      paintAvatar(document.getElementById("sidebarAvatar"), contact.name, contact.avatarDataUrl);
      paintAvatar(modalAvatar, contact.name, contact.avatarDataUrl);
      document.title = contact.name;
      input.placeholder = `Message ${contact.name}`;
      document.querySelectorAll(".msg.them .msg-author").forEach((el) => {
        el.textContent = contact.name;
      });
      document.querySelectorAll(".msg.them .msg-avatar").forEach((el) => {
        paintAvatar(el, contact.name, contact.avatarDataUrl);
      });
    }

    function openContactModal() {
      contactNameInput.value = contact.name;
      draftAvatar = contact.avatarDataUrl;
      setStyleButtons(contact.style || "friend");
      setAppearanceButtons(contact.appearance || "auto");
      paintAvatar(modalAvatar, contact.name, draftAvatar);
      contactModal.classList.add("open");
      contactNameInput.focus();
      contactNameInput.select();
    }

    function closeContactModal() {
      contactModal.classList.remove("open");
      draftAvatar = contact.avatarDataUrl;
      draftStyle = contact.style || "friend";
      draftAppearance = contact.appearance || "auto";
    }

    document.getElementById("openContact").addEventListener("click", openContactModal);
    document.getElementById("openContact").addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openContactModal();
      }
    });
    document.getElementById("detailsBtn").addEventListener("click", openContactModal);
    document.getElementById("cancelContactBtn").addEventListener("click", closeContactModal);
    contactModal.addEventListener("click", (e) => {
      if (e.target === contactModal) closeContactModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && contactModal.classList.contains("open")) closeContactModal();
    });

    document.getElementById("styleAssistant").addEventListener("click", () => setStyleButtons("assistant"));
    document.getElementById("styleFriend").addEventListener("click", () => setStyleButtons("friend"));
    document.getElementById("appearanceLight").addEventListener("click", () => setAppearanceButtons("light"));
    document.getElementById("appearanceDark").addEventListener("click", () => setAppearanceButtons("dark"));
    document.getElementById("appearanceAuto").addEventListener("click", () => setAppearanceButtons("auto"));

    document.getElementById("changePhotoBtn").addEventListener("click", () => avatarInput.click());
    document.getElementById("clearPhotoBtn").addEventListener("click", () => {
      draftAvatar = null;
      paintAvatar(modalAvatar, contactNameInput.value || contact.name, null);
    });

    contactNameInput.addEventListener("input", () => {
      if (!draftAvatar) paintAvatar(modalAvatar, contactNameInput.value || "?", null);
    });

    avatarInput.addEventListener("change", () => {
      const file = avatarInput.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        draftAvatar = reader.result;
        paintAvatar(modalAvatar, contactNameInput.value || contact.name, draftAvatar);
      };
      reader.readAsDataURL(file);
      avatarInput.value = "";
    });

    document.getElementById("saveContactBtn").addEventListener("click", () => {
      const name = contactNameInput.value.trim() || DEFAULT_CONTACT.name;
      saveContact({
        name,
        avatarDataUrl: draftAvatar,
        style: draftStyle,
        appearance: draftAppearance
      });
      closeContactModal();
    });

    const onSchemeChange = () => {
      if ((contact.appearance || "auto") === "auto") applyTheme();
    };
    if (mediaQuery.addEventListener) mediaQuery.addEventListener("change", onSchemeChange);
    else mediaQuery.addListener(onSchemeChange);

    function formatBytes(n) {
      if (n < 1024) return n + " B";
      if (n < 1024 * 1024) return (n / 1024).toFixed(0) + " KB";
      return (n / (1024 * 1024)).toFixed(1) + " MB";
    }

    function extLabel(name) {
      return ((name.split(".").pop() || "FILE").toUpperCase()).slice(0, 4);
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function resizeInput() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 140) + "px";
      const canSend = (input.value.trim().length > 0 || pendingFiles.length > 0) && !busy;
      sendBtn.classList.toggle("active", canSend);
    }

    function renderPending() {
      pendingEl.innerHTML = "";
      pendingFiles.forEach((item, index) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        if (item.kind === "image") {
          chip.innerHTML = `<img src="${item.url}" alt="" /><button class="remove" type="button" data-i="${index}" aria-label="Remove">×</button>`;
        } else {
          const klass = item.name.toLowerCase().endsWith(".pdf") ? "pdf" : "";
          chip.innerHTML = `
            <div class="file-row">
              <div class="file-icon ${klass}">${extLabel(item.name)}</div>
              <div>
                <div class="file-name">${item.name}</div>
                <div class="file-size">${formatBytes(item.size)}</div>
              </div>
            </div>
            <button class="remove" type="button" data-i="${index}" aria-label="Remove">×</button>`;
        }
        pendingEl.appendChild(chip);
      });
      pendingEl.querySelectorAll(".remove").forEach((btn) => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.i);
          const removed = pendingFiles.splice(i, 1)[0];
          if (removed?.url) URL.revokeObjectURL(removed.url);
          renderPending();
          resizeInput();
        });
      });
      resizeInput();
    }

    function appendMessage({ side, text, attachments = [] }) {
      const row = document.createElement("div");
      row.className = `msg ${side === "out" ? "you" : "them"}`;

      const avatar = document.createElement("div");
      avatar.className = `msg-avatar ${side === "out" ? "you" : ""}`;
      if (side === "out") {
        avatar.textContent = "Y";
      } else {
        paintAvatar(avatar, contact.name, contact.avatarDataUrl);
      }

      const content = document.createElement("div");
      const meta = document.createElement("div");
      meta.className = "msg-meta";
      meta.innerHTML = `
        <span class="msg-author ${side === "out" ? "you" : ""}">${side === "out" ? "You" : contact.name}</span>
        <span class="msg-time">${formatTime()}</span>`;

      const body = document.createElement("div");
      body.className = "msg-body";
      if (text) body.textContent = text;

      attachments.forEach((item) => {
        const card = document.createElement("div");
        card.className = "attach-card";
        if (item.kind === "image") {
          card.innerHTML = `<img src="${item.url}" alt="${item.name}" />`;
        } else {
          const klass = item.name.toLowerCase().endsWith(".pdf") ? "pdf" : "";
          card.innerHTML = `
            <div class="file-row">
              <div class="file-icon ${klass}">${extLabel(item.name)}</div>
              <div>
                <div class="file-name">${item.name}</div>
                <div class="file-size">${formatBytes(item.size)}</div>
              </div>
            </div>`;
        }
        body.appendChild(card);
      });

      content.appendChild(meta);
      content.appendChild(body);
      row.appendChild(avatar);
      row.appendChild(content);
      thread.appendChild(row);
      thread.scrollTop = thread.scrollHeight;
    }

    function showTyping() {
      typingRow.hidden = false;
      typingRow.innerHTML = `${contact.name} is typing <span class="dots"><span></span><span></span><span></span></span>`;
    }

    function hideTyping() {
      typingRow.hidden = true;
      typingRow.textContent = "";
    }

    async function prepareAttachments(attachments) {
      const images = [];
      const notes = [];
      for (const item of attachments) {
        if (item.kind === "image" && item.file) {
          const dataUrl = await fileToDataUrl(item.file);
          images.push(dataUrl);
          item.url = dataUrl;
        } else if (item.file) {
          const formData = new FormData();
          formData.append("file", item.file);
          try {
            const res = await fetch("/api/extract-text", { method: "POST", body: formData });
            if (res.ok) {
              const data = await res.json();
              notes.push(`Attached file "${data.name}":\n${data.text}`);
            } else {
              notes.push(`Attached file "${item.name}" (could not read contents).`);
            }
          } catch {
            notes.push(`Attached file "${item.name}" (could not read contents).`);
          }
        }
      }
      return { images, notes };
    }

    async function askModel() {
      showTyping();
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contact_name: contact.name,
            style: contact.style || "friend",
            messages: history
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || "Request failed");

        const parts = Array.isArray(data.replies) && data.replies.length
          ? data.replies.map((p) => String(p || "").trim()).filter(Boolean)
          : [((data.reply || "").trim() || "hmm")];

        const full = parts.join("\n\n");
        history.push({ role: "assistant", content: full, images: [] });

        for (let i = 0; i < parts.length; i += 1) {
          if (i > 0) {
            showTyping();
            await new Promise((r) => setTimeout(r, 700 + Math.random() * 900));
          }
          hideTyping();
          appendMessage({ side: "in", text: parts[i] });
          if (i < parts.length - 1) {
            await new Promise((r) => setTimeout(r, 250 + Math.random() * 350));
          }
        }
      } catch (err) {
        hideTyping();
        appendMessage({ side: "in", text: "Couldn't send — try again in a sec." });
        console.error(err);
      }
    }

    attachBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      Array.from(fileInput.files || []).forEach((file) => {
        const isImage = file.type.startsWith("image/");
        pendingFiles.push({
          kind: isImage ? "image" : "file",
          name: file.name,
          size: file.size,
          url: isImage ? URL.createObjectURL(file) : null,
          file
        });
      });
      fileInput.value = "";
      renderPending();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      const attachments = pendingFiles.splice(0, pendingFiles.length);
      renderPending();
      if ((!text && attachments.length === 0) || busy) return;

      busy = true;
      resizeInput();

      const prepared = await prepareAttachments(attachments);
      appendMessage({ side: "out", text, attachments });

      let content = text;
      if (prepared.notes.length) {
        content = [text, ...prepared.notes].filter(Boolean).join("\n\n");
      }

      history.push({
        role: "user",
        content: content || (prepared.images.length ? "sent a photo" : ""),
        images: prepared.images
      });

      input.value = "";
      resizeInput();
      await askModel();
      busy = false;
      resizeInput();
      input.focus();
    });

    input.addEventListener("input", resizeInput);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    // Seed opening messages in Slack layout
    appendMessage({ side: "in", text: "Hey — you free for a sec?" });
    appendMessage({ side: "in", text: "Need a quick take on something." });

    applyContact();
    applyTheme();
    resizeInput();
  </script>
</body>
</html>
