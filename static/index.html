<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light dark" />
<title>Workspace</title>
<script>
  (function () {
    try {
      var raw = localStorage.getItem("messages-chat-contact");
      var appearance = "auto";
      var skin = "slack";
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed && (parsed.appearance === "light" || parsed.appearance === "dark" || parsed.appearance === "auto")) {
          appearance = parsed.appearance;
        }
        if (parsed && parsed.skin === "whatsapp") {
          skin = "whatsapp";
        }
      }
      var theme = appearance === "auto"
        ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : appearance;
      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.setAttribute("data-skin", skin);
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "dark");
      document.documentElement.setAttribute("data-skin", "slack");
    }
  })();
</script>
<style>
  :root, [data-theme="dark"] {
    color-scheme: dark;
    --page-bg: #1a1d21;
    --sidebar-bg: #19171d;
    --sidebar-text: #d1d2d3;
    --sidebar-muted: #ababad;
    --sidebar-hover: rgba(255, 255, 255, 0.06);
    --sidebar-active: #1164a3;
    --main-bg: #1a1d21;
    --header-bg: #1a1d21;
    --header-text: #f8f8f8;
    --header-icon: #ababad;
    --text: #d1d2d3;
    --text-strong: #f8f8f8;
    --text-secondary: #ababad;
    --separator: rgba(255, 255, 255, 0.1);
    --hover: rgba(255, 255, 255, 0.04);
    --composer-border: #565856;
    --composer-bg: #222529;
    --input-bg: #222529;
    --msg-hover: rgba(255, 255, 255, 0.03);
    --accent: #007a5a;
    --modal-bg: #1a1d21;
    --modal-overlay: rgba(0, 0, 0, 0.55);
    --card-bg: #222529;
    --search-bg: rgba(255, 255, 255, 0.08);
    --segment-bg: rgba(255, 255, 255, 0.08);
    --segment-active: #222529;
    --you-label: #e01e5a;
  }

  [data-theme="light"] {
    color-scheme: light;
    --page-bg: #ffffff;
    --sidebar-bg: #3f0e40;
    --sidebar-text: #ffffff;
    --sidebar-muted: rgba(255, 255, 255, 0.7);
    --sidebar-hover: rgba(255, 255, 255, 0.1);
    --sidebar-active: #1164a3;
    --main-bg: #ffffff;
    --header-bg: #ffffff;
    --header-text: #1d1c1d;
    --header-icon: #616061;
    --text: #1d1c1d;
    --text-strong: #1d1c1d;
    --text-secondary: #616061;
    --separator: rgba(29, 28, 29, 0.13);
    --hover: rgba(29, 28, 29, 0.04);
    --composer-border: #868686;
    --composer-bg: #ffffff;
    --input-bg: #ffffff;
    --msg-hover: rgba(29, 28, 29, 0.04);
    --accent: #007a5a;
    --modal-bg: #ffffff;
    --modal-overlay: rgba(0, 0, 0, 0.4);
    --card-bg: #f8f8f8;
    --search-bg: rgba(255, 255, 255, 0.15);
    --segment-bg: #f2f2f2;
    --segment-active: #ffffff;
    --you-label: #e01e5a;
  }

  /* Slack always reads as aubergine/purple, in either theme. */
  [data-skin="slack"][data-theme="dark"] {
    --sidebar-bg: #1a121c;
    --sidebar-hover: rgba(255, 255, 255, 0.08);
    --sidebar-active: #1164a3;
  }

  [data-skin="slack"][data-theme="light"] {
    --sidebar-bg: #3f0e40;
    --sidebar-text: #ffffff;
    --sidebar-muted: rgba(255, 255, 255, 0.7);
    --sidebar-hover: rgba(255, 255, 255, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--page-bg);
    color: var(--text);
    font-family: "Slack-Lato", "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI",
      Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  button { font-family: inherit; }

  .app {
    height: 100%;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* ——— Slack top bar (Slack only) ——— */
  .slack-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    height: 44px;
    flex-shrink: 0;
    padding: 0 12px;
    background: linear-gradient(180deg, #350d36, #26102b);
    border-bottom: 1px solid rgba(0, 0, 0, 0.4);
  }

  .topbar-left, .topbar-right {
    display: flex;
    align-items: center;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }

  .topbar-right { justify-content: flex-end; }

  .topbar-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 0;
    background: transparent;
    color: rgba(255, 255, 255, 0.65);
    font-size: 15px;
    cursor: pointer;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .topbar-icon:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }

  .topbar-search {
    flex: 0 1 520px;
    height: 28px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 13px;
    cursor: text;
  }

  .topbar-search:hover { background: rgba(255, 255, 255, 0.17); }
  .topbar-search-icon { font-size: 12px; opacity: 0.85; }

  .topbar-avatar {
    width: 24px;
    height: 24px;
    border-radius: 5px;
    display: grid;
    place-items: center;
    font-size: 11px;
    font-weight: 700;
    color: white;
    background: linear-gradient(145deg, #36c5f0, #2eb67d);
    margin-left: 6px;
    cursor: default;
    flex-shrink: 0;
  }

  .app-body {
    flex: 1;
    display: grid;
    grid-template-columns: 64px 260px 1fr;
    min-height: 0;
  }

  /* ——— Left icon rail (WhatsApp only) ——— */
  .rail {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    background: var(--rail-bg, #111b21);
    padding: 12px 0 14px;
    min-width: 0;
  }

  .rail-top, .rail-bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .rail-btn {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    border: 0;
    background: transparent;
    color: var(--rail-icon, #aebac1);
    cursor: pointer;
    display: grid;
    place-items: center;
  }

  .rail-btn:hover { background: rgba(255, 255, 255, 0.06); color: #fff; }
  .rail-btn.active { color: var(--rail-active, #fff); }

  .rail-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
    background: linear-gradient(145deg, #36c5f0, #2eb67d);
    margin-top: 6px;
    cursor: default;
  }

  /* ——— Slack left rail (Slack only) ——— */
  .slack-rail {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    background: #1a121c;
    padding: 10px 0 12px;
    min-width: 0;
  }

  .slack-rail-top {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .slack-rail-badge {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-size: 14px;
    font-weight: 800;
    color: white;
    background: linear-gradient(145deg, #36c5f0, #2eb67d);
    margin-bottom: 6px;
    cursor: default;
    flex-shrink: 0;
  }

  .slack-rail-btn {
    width: 48px;
    height: 44px;
    border: 0;
    border-radius: 10px;
    background: transparent;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 10px;
  }

  .slack-rail-btn svg { width: 20px; height: 20px; }
  .slack-rail-btn:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
  .slack-rail-btn.active { background: rgba(255, 255, 255, 0.16); color: #fff; }
  .slack-rail-label { font-size: 10px; font-weight: 600; line-height: 1; }

  .slack-rail-bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .slack-rail-btn.small {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    font-size: 15px;
  }

  .slack-rail-avatar {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-size: 11px;
    font-weight: 700;
    color: white;
    background: linear-gradient(145deg, #e01e5a, #ecb22e);
    margin-top: 2px;
    cursor: default;
  }

  .sidebar {
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    min-width: 0;
    border-right: 1px solid rgba(0, 0, 0, 0.2);
  }

  .workspace-bar {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .workspace-wrap {
    position: relative;
    flex: 1;
    min-width: 0;
  }

  .workspace {
    padding: 14px 16px;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.02em;
    appearance: none;
    border: 0;
    background: transparent;
    color: inherit;
    text-align: left;
    width: 100%;
    height: 100%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .workspace:hover { background: var(--sidebar-hover); }

  .workspace-caret {
    font-size: 10px;
    opacity: 0.7;
    color: var(--sidebar-muted);
    transition: transform 0.15s ease;
  }

  .workspace-wrap.open .workspace-caret { transform: rotate(180deg); }

  .workspace-menu {
    display: none;
    position: absolute;
    left: 8px;
    right: 8px;
    top: calc(100% - 4px);
    z-index: 20;
    background: var(--modal-bg);
    color: var(--text);
    border: 1px solid var(--separator);
    border-radius: 8px;
    padding: 6px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
  }

  .workspace-wrap.open .workspace-menu { display: block; }

  .workspace-menu button {
    width: 100%;
    appearance: none;
    border: 0;
    background: transparent;
    color: inherit;
    text-align: left;
    padding: 10px 12px;
    border-radius: 6px;
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .workspace-menu button:hover { background: var(--hover); }

  .workspace-menu button.active::after {
    content: "✓";
    color: var(--accent);
    font-weight: 700;
  }

  .workspace-extra {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 10px;
  }

  .workspace-extra button {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 0;
    background: transparent;
    color: var(--header-icon, var(--sidebar-muted));
    font-size: 18px;
    cursor: pointer;
    display: grid;
    place-items: center;
  }

  .workspace-extra button:hover { background: var(--sidebar-hover); }

  .sidebar-search-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px 6px;
  }

  .sidebar-search-row .search-icon {
    font-size: 13px;
    opacity: 0.6;
    flex-shrink: 0;
  }

  .sidebar-search-row input {
    flex: 1;
    width: 100%;
    height: 30px;
    border: 0;
    border-radius: 6px;
    outline: none;
    background: var(--search-bg);
    color: inherit;
    padding: 0 10px;
    font: inherit;
    font-size: 13px;
  }

  .sidebar-search-row input::placeholder { color: var(--sidebar-muted); }

  /* ——— Slack sidebar nav / channels (Slack only) ——— */
  .slack-nav {
    display: flex;
    flex-direction: column;
    padding: 4px 8px;
    gap: 1px;
  }

  .slack-nav-item, .slack-channel {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    text-align: left;
    border: 0;
    background: transparent;
    color: var(--sidebar-text);
    font: inherit;
    font-size: 15px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
  }

  .slack-nav-item:hover, .slack-channel:hover { background: var(--sidebar-hover); }
  .slack-nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

  .channels-section { padding-bottom: 4px; }

  .channels-section .section-label-row { padding: 10px 10px 4px 16px; }

  .slack-channel { padding: 5px 16px; color: var(--sidebar-muted); }
  .slack-channel .hash { opacity: 0.75; margin-right: 2px; }

  .section-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 10px 6px 16px;
    gap: 8px;
  }

  .section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--sidebar-muted);
  }

  .add-dm-btn {
    width: 26px;
    height: 26px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--sidebar-muted);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: grid;
    place-items: center;
  }

  .add-dm-btn:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }

  .filter-pills {
    display: none;
    gap: 8px;
    padding: 8px 12px 10px;
    overflow-x: auto;
  }

  .pill {
    appearance: none;
    border: 0;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    background: var(--pill-bg, var(--search-bg));
    color: var(--sidebar-text);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .pill.active {
    background: var(--pill-active-bg, var(--accent));
    color: var(--pill-active-text, #fff);
  }

  .conv-list { flex: 1; overflow-y: auto; padding: 0 8px 12px; }

  .conv {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--sidebar-text);
    font-size: 15px;
    width: 100%;
    appearance: none;
    border: 0;
    background: transparent;
    text-align: left;
    font-family: inherit;
  }

  .conv:hover { background: var(--sidebar-hover); }
  .conv.active { background: var(--sidebar-active); color: #fff; }

  .conv-avatar {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    display: grid;
    place-items: center;
    font-size: 11px;
    font-weight: 700;
    color: white;
    background: linear-gradient(145deg, #e01e5a, #ecb22e);
    background-size: cover;
    background-position: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  .conv-avatar.green { background: linear-gradient(145deg, #2eb67d, #007a5a); }
  .conv-avatar.orange { background: linear-gradient(145deg, #ecb22e, #e01e5a); }
  .conv-avatar.blue { background: linear-gradient(145deg, #36c5f0, #1264a3); }
  .conv-avatar.purple { background: linear-gradient(145deg, #8e5cf7, #4a154b); }
  .conv-avatar.has-photo { color: transparent; font-size: 0; }

  .conv-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }

  .conv-top-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }

  .conv-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }

  .conv-time { display: none; font-size: 12px; color: var(--sidebar-muted); flex-shrink: 0; }

  .conv-preview {
    display: none;
    font-size: 13px;
    color: var(--sidebar-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conv.active .conv-preview, .conv.active .conv-time { color: rgba(255, 255, 255, 0.75); }

  .presence {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2eb67d;
    margin-left: auto;
    flex-shrink: 0;
  }

  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--main-bg);
  }

  .chat-header {
    height: 49px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--separator);
    background: var(--header-bg);
  }

  .chat-person {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border-radius: 6px;
    padding: 4px 6px;
    margin-left: -6px;
  }

  .chat-person:hover { background: var(--hover); }

  .header-avatar {
    width: 32px;
    height: 32px;
    font-size: 13px;
    display: none;
  }

  .chat-person-text { display: flex; flex-direction: column; }

  .chat-person .name {
    font-size: 17px;
    font-weight: 800;
    color: var(--header-text);
    letter-spacing: -0.02em;
  }

  .chat-person-sub {
    display: none;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .header-actions { display: flex; align-items: center; gap: 2px; }

  .header-actions button {
    width: 32px;
    height: 32px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--header-icon);
    cursor: pointer;
    font-size: 15px;
  }

  .header-actions button:hover { background: var(--hover); }

  .thread {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0 8px;
    scroll-behavior: smooth;
  }

  .day {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px 20px 12px;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 700;
  }

  .day::before, .day::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--separator);
  }

  .msg {
    display: grid;
    grid-template-columns: 40px 1fr;
    gap: 8px;
    padding: 8px 20px;
    animation: rise 0.18s ease-out;
  }

  .msg:hover { background: var(--msg-hover); }

  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-size: 14px;
    font-weight: 700;
    color: white;
    background: linear-gradient(145deg, #e01e5a, #ecb22e);
    background-size: cover;
    background-position: center;
    overflow: hidden;
    margin-top: 2px;
  }

  .msg-avatar.green { background: linear-gradient(145deg, #2eb67d, #007a5a); }
  .msg-avatar.orange { background: linear-gradient(145deg, #ecb22e, #e01e5a); }
  .msg-avatar.blue { background: linear-gradient(145deg, #36c5f0, #1264a3); }
  .msg-avatar.purple { background: linear-gradient(145deg, #8e5cf7, #4a154b); }
  .msg-avatar.you { background: linear-gradient(145deg, #36c5f0, #2eb67d); }
  .msg-avatar.has-photo { color: transparent; font-size: 0; }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 2px;
  }

  .msg-author {
    font-size: 15px;
    font-weight: 800;
    color: var(--text-strong);
  }

  .msg-author.you { color: var(--you-label); }

  .msg-time {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .msg-body {
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
    color: var(--text);
  }

  .attach-card {
    margin-top: 8px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--card-bg);
    border: 1px solid var(--separator);
    max-width: 320px;
  }

  .attach-card img {
    display: block;
    width: 100%;
    max-height: 220px;
    object-fit: cover;
  }

  .file-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
  }

  .file-icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: #1264a3;
    color: white;
    display: grid;
    place-items: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .file-icon.pdf { background: #e01e5a; }

  .file-name { font-size: 13px; font-weight: 600; }
  .file-size { font-size: 12px; color: var(--text-secondary); }

  .typing-row {
    padding: 4px 20px 10px 68px;
    font-size: 13px;
    color: var(--text-secondary);
    min-height: 24px;
  }

  .typing-row .dots span {
    display: inline-block;
    width: 4px;
    height: 4px;
    margin: 0 1px;
    border-radius: 50%;
    background: var(--text-secondary);
    animation: bounce 1.2s infinite ease-in-out;
  }

  .typing-row .dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-row .dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-3px); opacity: 1; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .composer-wrap {
    flex-shrink: 0;
    padding: 0 20px 16px;
  }

  .pending {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 0 8px;
  }

  .pending:empty { display: none; }

  .chip {

    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--separator);
    background: var(--card-bg);
    max-width: 140px;

    display: block;
    width: 140px;
    height: 90px;
    object-fit: cover;
  }

  .chip .file-row { padding: 8px 10px; min-width: 120px; }

  .chip .remove {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 0;
    background: rgba(0, 0, 0, 0.65);
    color: white;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
  }

  .composer {
    border: 1px solid var(--composer-border);
    border-radius: 8px;
    background: var(--composer-bg);
    padding: 8px 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .composer:focus-within { border-color: var(--text-secondary); }

  #message {
    width: 100%;
    resize: none;
    border: 0;
    outline: none;
    background: transparent;
    color: var(--text);
    font: inherit;
    font-size: 15px;
    line-height: 1.4;
    max-height: 140px;
    min-height: 24px;
    padding: 4px 2px;
  }

  #message::placeholder { color: var(--text-secondary); }

  .composer-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .icon-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 0;
    background: transparent;
    color: var(--text-secondary);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: grid;
    place-items: center;
  }

  .icon-btn:hover { background: var(--hover); color: var(--text); }

  #send {
    height: 28px;
    padding: 0 12px;
    border-radius: 4px;
    border: 0;
    background: var(--accent);
    color: white;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    opacity: 0.4;
    pointer-events: none;
  }

  #send.active { opacity: 1; pointer-events: auto; }

  #fileInput, #avatarInput { display: none; }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: var(--modal-overlay);
    display: none;
    place-items: center;
    z-index: 50;
    padding: 20px;
  }

  .modal-backdrop.open { display: grid; }

  .modal {
    width: min(400px, 100%);
    background: var(--modal-bg);
    border: 1px solid var(--separator);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
  }

  .modal h2 {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 16px;
    color: var(--text-strong);
  }

  .modal-avatar-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .modal-avatar-preview {
    width: 64px;
    height: 64px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-size: 24px;
    font-weight: 700;
    color: white;
    background: linear-gradient(145deg, #e01e5a, #ecb22e);
    background-size: cover;
    background-position: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  .modal-avatar-preview.green { background: linear-gradient(145deg, #2eb67d, #007a5a); }
  .modal-avatar-preview.orange { background: linear-gradient(145deg, #ecb22e, #e01e5a); }
  .modal-avatar-preview.blue { background: linear-gradient(145deg, #36c5f0, #1264a3); }
  .modal-avatar-preview.purple { background: linear-gradient(145deg, #8e5cf7, #4a154b); }
  .modal-avatar-preview.has-photo { color: transparent; font-size: 0; }

  .modal-avatar-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .modal label, .style-field > span {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .modal input[type="text"] {
    width: 100%;
    height: 36px;
    border-radius: 6px;
    border: 1px solid var(--separator);
    background: var(--search-bg);
    color: var(--text);
    padding: 0 12px;
    font: inherit;
    font-size: 14px;
    outline: none;
    margin-bottom: 14px;
  }

  .modal input[type="text"]:focus { border-color: var(--accent); }

  .style-field { margin-bottom: 14px; }

  .style-switch {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 3px;
    border-radius: 8px;
    background: var(--segment-bg);
    border: 1px solid var(--separator);
  }

  .style-switch.three { grid-template-columns: 1fr 1fr 1fr; }

  .style-switch button {
    appearance: none;
    border: 0;
    border-radius: 6px;
    height: 32px;
    background: transparent;
    color: var(--text-secondary);
    font: inherit;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }

  .style-switch button.active {
    background: var(--segment-active);
    color: var(--text-strong);
    box-shadow: 0 0.5px 1px rgba(0, 0, 0, 0.12);
  }

  .style-hint {
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.4;
    color: var(--text-secondary);
  }

  .btn-row {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 4px;
  }

  .btn {
    height: 32px;
    padding: 0 14px;
    border-radius: 6px;
    border: 0;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  .btn.ghost { background: transparent; color: var(--text-secondary); }
  .btn.ghost:hover { background: var(--hover); color: var(--text); }
  .btn.primary { background: var(--accent); color: white; }
  .btn.secondary { background: var(--segment-bg); color: var(--text); }
  .btn.secondary:hover { background: var(--hover); }

  /* ——— WhatsApp skin ——— */

      <div class="slack-rail-bottom">
        <button type="button" class="slack-rail-btn small" title="Add" tabindex="-1">+</button>
        <button type="button" class="slack-rail-btn small" title="Theme" tabindex="-1">☾</button>
        <div class="slack-rail-avatar" id="slackRailAvatar">Y</div>
      </div>
    </nav>

    <aside class="sidebar">
      <div class="workspace-bar">
        <div class="workspace-wrap" id="workspaceWrap">
          <button type="button" class="workspace" id="skinToggle" aria-haspopup="menu" aria-expanded="false">
            <span id="workspaceLabel">Workspace</span>
            <span class="workspace-caret" aria-hidden="true">▾</span>
          </button>
          <div class="workspace-menu" id="workspaceMenu" role="menu" hidden>
            <button type="button" role="menuitem" data-skin="slack" id="menuSlack">Slack</button>
            <button type="button" role="menuitem" data-skin="whatsapp" id="menuWhatsapp">WhatsApp</button>
          </div>
        </div>
        <div class="workspace-extra">
          <button type="button" id="addChatBtn" title="New chat" aria-label="New chat">+</button>
          <button type="button" id="moreMenuBtn" title="Menu" aria-label="Menu">⋮</button>
        </div>
      </div>

      <div class="sidebar-search-row">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input type="text" id="convSearch" placeholder="Search" />
      </div>

      <nav class="slack-nav" id="slackNav" aria-hidden="true">
        <button type="button" class="slack-nav-item" tabindex="-1"><span class="slack-nav-icon">🤖</span> Slackbot</button>
        <button type="button" class="slack-nav-item" tabindex="-1"><span class="slack-nav-icon">🎧</span> Huddles</button>
        <button type="button" class="slack-nav-item" tabindex="-1"><span class="slack-nav-icon">👥</span> Directories</button>
      </nav>

      <div class="channels-section" id="channelsSection" aria-hidden="true">
        <div class="section-label-row">
          <div class="section-label">Channels</div>
        </div>
        <button type="button" class="slack-channel" tabindex="-1"><span class="hash">#</span>general</button>
        <button type="button" class="slack-channel" tabindex="-1"><span class="hash">#</span>random</button>
      </div>

      <div class="section-label-row" id="sectionLabelRow">
        <div class="section-label">Direct messages</div>
        <button type="button" class="add-dm-btn" id="addDmBtn" title="Add person" aria-label="Add person">+</button>
      </div>

      <div class="filter-pills" id="filterPills">
        <button type="button" class="pill active" data-filter="all">All</button>
        <button type="button" class="pill" data-filter="unread">Unread</button>
        <button type="button" class="pill" data-filter="favorites">Favorites</button>
        <button type="button" class="pill" data-filter="groups">Groups</button>
      </div>

      <div class="conv-list" id="convList"></div>
    </aside>

    <section class="main">
      <header class="chat-header">
        <div class="chat-person" id="openContact" title="Edit profile" role="button" tabindex="0">
          <div class="conv-avatar header-avatar" id="headerAvatar"></div>
          <div class="chat-person-text">
            <div class="name" id="headerName">Suchen</div>
            <div class="chat-person-sub">online</div>
          </div>
        </div>
        <div class="header-actions">
          <button type="button" id="detailsBtn" title="Edit profile" aria-label="Edit profile">ⓘ</button>
        </div>
      </header>

      <main class="thread" id="thread" aria-live="polite"></main>

      <div class="typing-row" id="typingRow" hidden></div>

      <div class="composer-wrap">
        <div class="pending" id="pending"></div>
        <form class="composer" id="composer" autocomplete="off">
          <textarea id="message" rows="1" placeholder="Message"></textarea>
          <div class="composer-bar">
            <button class="icon-btn" type="button" id="attachBtn" title="Attach" aria-label="Attach file">+</button>
            <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.doc,.docx,.md,.csv" />
            <button id="send" type="submit">Send</button>
          </div>
        </form>
      </div>
    </section>
  </div>
</div>

<div class="modal-backdrop" id="personModal" role="dialog" aria-modal="true" aria-labelledby="personModalTitle">
  <div class="modal">
    <h2 id="personModalTitle">Edit profile</h2>
    <div class="modal-avatar-row">
      <div class="modal-avatar-preview" id="modalAvatar">?</div>
      <div class="modal-avatar-actions">
        <button type="button" class="btn secondary" id="changePhotoBtn">Choose photo…</button>
        <button type="button" class="btn ghost" id="clearPhotoBtn">Use initial</button>
      </div>
    </div>
    <label for="contactNameInput">Display name</label>
    <input type="text" id="contactNameInput" maxlength="40" placeholder="Display name" />
    <div class="style-field" id="appearanceSection">
      <span>Appearance</span>
      <div class="style-switch three" role="group" aria-label="Appearance">
        <button type="button" id="appearanceLight" data-appearance="light">Light</button>
        <button type="button" id="appearanceDark" data-appearance="dark">Dark</button>
        <button type="button" id="appearanceAuto" data-appearance="auto" class="active">Auto</button>
      </div>
      <p class="style-hint" id="appearanceHint">Matches your system: light by day, dark at night.</p>
    </div>
    <div class="btn-row">
      <button type="button" class="btn ghost" id="deleteContactBtn" hidden>Delete</button>
      <span style="flex:1"></span>
      <button type="button" class="btn ghost" id="cancelContactBtn">Cancel</button>
      <button type="button" class="btn primary" id="saveContactBtn">Save</button>
    </div>
  </div>
</div>
<input type="file" id="avatarInput" accept="image/*" />

<script>
  const thread = document.getElementById("thread");
  const form = document.getElementById("composer");
  const input = document.getElementById("message");
  const sendBtn = document.getElementById("send");
  const attachBtn = document.getElementById("attachBtn");
  const fileInput = document.getElementById("fileInput");
  const pendingEl = document.getElementById("pending");
  const personModal = document.getElementById("personModal");
  const personModalTitle = document.getElementById("personModalTitle");
  const nameInput = document.getElementById("contactNameInput");
  const modalAvatar = document.getElementById("modalAvatar");
  const avatarInput = document.getElementById("avatarInput");
  const typingRow = document.getElementById("typingRow");
  const convList = document.getElementById("convList");
  const searchInput = document.getElementById("convSearch");
  const appearanceSection = document.getElementById("appearanceSection");
  const deleteBtn = document.getElementById("deleteContactBtn");

  const STORAGE_KEY = "messages-chat-contact";
  const ACCENTS = ["pink", "green", "orange", "blue", "purple"];
  const APPEARANCE_HINTS = {
    light: "Always use light mode.",
    dark: "Always use dark mode.",
    auto: "Matches your system: light by day, dark at night."
  };

  function uid() {
    return "p" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);
  }

  function accentClass(accent) { return accent === "pink" ? "" : accent; }

  function seedThreads(people) {
    const threads = {};
    threads[people[0].id] = [
      { role: "assistant", content: "Hey — you free for a sec?", images: [], time: "9:14 AM" },
      { role: "assistant", content: "Need a quick take on something.", images: [], time: "9:14 AM" }
    ];
    if (people[1]) {
      threads[people[1].id] = [
        { role: "assistant", content: "Sounds good, see you then!", images: [], time: "Yesterday" }
      ];
    }
    if (people[2]) {
      threads[people[2].id] = [
        { role: "assistant", content: "Just sent the files over — let me know if anything's missing.", images: [], time: "Yesterday" }
      ];
    }
    return threads;
  }

  function loadState() {
    let parsed = null;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) parsed = JSON.parse(raw);
    } catch {
      parsed = null;
    }

    const appearance = parsed && ["light", "dark", "auto"].includes(parsed.appearance) ? parsed.appearance : "auto";
    const skin = parsed && parsed.skin === "whatsapp" ? "whatsapp" : "slack";

    if (parsed && Array.isArray(parsed.people) && parsed.people.length) {
      const people = parsed.people.map((p, i) => ({
        id: p && p.id ? String(p.id) : uid(),
        name: (p && p.name ? String(p.name).trim() : "") || `Person ${i + 1}`,
        avatarDataUrl: (p && p.avatarDataUrl) || null,
        accent: (p && ACCENTS.includes(p.accent)) ? p.accent : ACCENTS[i % ACCENTS.length]
      }));
      const threads = (parsed.threads && typeof parsed.threads === "object") ? parsed.threads : {};
      people.forEach((p) => { if (!Array.isArray(threads[p.id])) threads[p.id] = []; });
      const activeId = people.some((p) => p.id === parsed.activeId) ? parsed.activeId : people[0].id;
      return { skin, appearance, activeId, people, threads };
    }

    // Migrate legacy single-contact shape (or fresh install).
    const firstName = (parsed && typeof parsed.name === "string" && parsed.name.trim()) || "Suchen";
    const firstAvatar = (parsed && parsed.avatarDataUrl) || null;
    const people = [
      { id: uid(), name: firstName, avatarDataUrl: firstAvatar, accent: ACCENTS[0] },
      { id: uid(), name: "Sam", avatarDataUrl: null, accent: ACCENTS[1] },
      { id: uid(), name: "Jordan", avatarDataUrl: null, accent: ACCENTS[2] }
    ];
    const threads = seedThreads(people);
    return { skin, appearance, activeId: people[0].id, people, threads };
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  }

  let state = loadState();
  saveState();

  let draftAvatar = null;
  let draftAccent = ACCENTS[0];
  let draftAppearance = state.appearance;
  let modalMode = "edit";
  let editingPersonId = null;
  let mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
  let busy = false;
  const pendingFiles = [];

  function getActivePerson() {
    return state.people.find((p) => p.id === state.activeId) || state.people[0];
  }

  function resolvedTheme(appearance) {
    if (appearance === "light" || appearance === "dark") return appearance;
    return mediaQuery.matches ? "dark" : "light";
  }

  function initialFor(name) {
    return ((name || "?").trim()[0] || "?").toUpperCase();
  }

  function paintAvatar(el, name, avatarDataUrl) {
    if (avatarDataUrl) {
      el.classList.add("has-photo");
      el.style.backgroundImage = `url("${avatarDataUrl}")`;
      el.textContent = "";
    } else {
      el.classList.remove("has-photo");
      el.style.backgroundImage = "";
      el.textContent = initialFor(name);
    }
  }

  function formatTime(date = new Date()) {
    return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  }

  function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

  function applySkin() {
    document.documentElement.setAttribute("data-skin", state.skin);
    const isWa = state.skin === "whatsapp";
    const workspaceLabel = document.getElementById("workspaceLabel");
    workspaceLabel.textContent = isWa ? "WhatsApp" : "Workspace";
    document.getElementById("menuSlack").classList.toggle("active", !isWa);
    document.getElementById("menuWhatsapp").classList.toggle("active", isWa);
    document.getElementById("sectionLabelRow").hidden = false;
    searchInput.placeholder = isWa ? "Search or start a new chat" : "Find a conversation...";
    const topbarSearchText = document.getElementById("topbarSearchText");
    if (topbarSearchText) topbarSearchText.textContent = "Search " + workspaceLabel.textContent;
    document.querySelector(".app").setAttribute("aria-label", isWa ? "WhatsApp" : "Slack");
    renderConvList();
    renderActiveHeader();
  }

  function applyTheme() {
    document.documentElement.setAttribute("data-theme", resolvedTheme(state.appearance));
    applySkin();
  }

  function setSkin(skin) {
    if (state.skin === skin) return;
    state.skin = skin;
    saveState();
    applyTheme();
  }

  const workspaceWrap = document.getElementById("workspaceWrap");
  const workspaceMenu = document.getElementById("workspaceMenu");
  const skinToggle = document.getElementById("skinToggle");

  function openWorkspaceMenu() {
    workspaceWrap.classList.add("open");
    workspaceMenu.hidden = false;
    skinToggle.setAttribute("aria-expanded", "true");
  }

  function closeWorkspaceMenu() {
    workspaceWrap.classList.remove("open");
    workspaceMenu.hidden = true;
    skinToggle.setAttribute("aria-expanded", "false");
  }

  skinToggle.addEventListener("click", () => {
    if (workspaceWrap.classList.contains("open")) closeWorkspaceMenu();
    else openWorkspaceMenu();
  });

  document.getElementById("menuSlack").addEventListener("click", () => { setSkin("slack"); closeWorkspaceMenu(); });
  document.getElementById("menuWhatsapp").addEventListener("click", () => { setSkin("whatsapp"); closeWorkspaceMenu(); });

  document.addEventListener("click", (e) => {
    if (!workspaceWrap.contains(e.target)) closeWorkspaceMenu();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeWorkspaceMenu();
  });

  const onSchemeChange = () => { if (state.appearance === "auto") applyTheme(); };
  if (mediaQuery.addEventListener) mediaQuery.addEventListener("change", onSchemeChange);
  else mediaQuery.addListener(onSchemeChange);

  function lastEntryOf(personId) {
    const entries = state.threads[personId] || [];
    return entries[entries.length - 1] || null;
  }

  function previewFor(personId) {
    const entry = lastEntryOf(personId);
    if (!entry) return "No messages yet";
    let text;
    if (entry.role === "user") {
      text = entry.content || (entry.attachments && entry.attachments.length ? "Sent an attachment" : "");
    } else if (Array.isArray(entry.bubbles) && entry.bubbles.length) {
      text = entry.bubbles[entry.bubbles.length - 1];
    } else {
      text = entry.content;
    }
    text = (text || "").replace(/\s+/g, " ").trim();
    if (!text) return "No messages yet";
    return text.length > 42 ? text.slice(0, 42) + "…" : text;
  }

  function timeFor(personId) {
    const entry = lastEntryOf(personId);
    return entry ? entry.time || "" : "";
  }

  function renderConvList() {
    const q = searchInput.value.trim().toLowerCase();
    convList.innerHTML = "";
    state.people
      .filter((p) => !q || p.name.toLowerCase().includes(q))
      .forEach((p) => {
        const row = document.createElement("button");
        row.type = "button";
        row.className = "conv" + (p.id === state.activeId ? " active" : "");
        row.dataset.id = p.id;

        const avatar = document.createElement("div");
        avatar.className = "conv-avatar " + (p.avatarDataUrl ? "" : accentClass(p.accent));
        paintAvatar(avatar, p.name, p.avatarDataUrl);

        const meta = document.createElement("div");
        meta.className = "conv-meta";

        const topRow = document.createElement("div");
        topRow.className = "conv-top-row";
        const nameEl = document.createElement("span");
        nameEl.className = "conv-name";
        nameEl.textContent = p.name;
        const timeEl = document.createElement("span");
        timeEl.className = "conv-time";
        timeEl.textContent = timeFor(p.id);
        topRow.append(nameEl, timeEl);

        const previewEl = document.createElement("div");
        previewEl.className = "conv-preview";
        previewEl.textContent = previewFor(p.id);

        meta.append(topRow, previewEl);

        const presence = document.createElement("span");
        presence.className = "presence";

        row.append(avatar, meta, presence);
        row.addEventListener("click", () => switchActive(p.id));
        convList.appendChild(row);
      });
  }

  function renderActiveHeader() {
    const p = getActivePerson();
    if (!p) return;
    document.getElementById("headerName").textContent = p.name;
    const headerAvatar = document.getElementById("headerAvatar");
    headerAvatar.className = "conv-avatar header-avatar " + (p.avatarDataUrl ? "" : accentClass(p.accent));
    paintAvatar(headerAvatar, p.name, p.avatarDataUrl);
    input.placeholder = state.skin === "whatsapp" ? "Type a message" : `Message ${p.name}`;
    document.title = p.name;
  }

  function formatBytes(n) {
    if (n < 1024) return n + " B";
    if (n < 1024 * 1024) return (n / 1024).toFixed(0) + " KB";
    return (n / (1024 * 1024)).toFixed(1) + " MB";
  }

  function extLabel(name) {
    return ((name.split(".").pop() || "FILE").toUpperCase()).slice(0, 4);
  }

  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function resizeInput() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
    const canSend = (input.value.trim().length > 0 || pendingFiles.length > 0) && !busy;
    sendBtn.classList.toggle("active", canSend);
  }

  function renderPending() {
    pendingEl.innerHTML = "";
    pendingFiles.forEach((item, index) => {
      const chip = document.createElement("div");
      chip.className = "chip";
      if (item.kind === "image") {
        chip.innerHTML = `<img src="${item.url}" alt="" /><button class="remove" type="button" data-i="${index}" aria-label="Remove">×</button>`;
      } else {
        const klass = item.name.toLowerCase().endsWith(".pdf") ? "pdf" : "";
        chip.innerHTML = `
          <div class="file-row">
            <div class="file-icon ${klass}">${extLabel(item.name)}</div>
            <div>
              <div class="file-name">${item.name}</div>
              <div class="file-size">${formatBytes(item.size)}</div>
            </div>
          </div>
          <button class="remove" type="button" data-i="${index}" aria-label="Remove">×</button>`;
      }
      pendingEl.appendChild(chip);
    });
    pendingEl.querySelectorAll(".remove").forEach((btn) => {
      btn.addEventListener("click", () => {
        const i = Number(btn.dataset.i);
        const removed = pendingFiles.splice(i, 1)[0];
        if (removed && removed.url && removed.kind === "image" && removed.url.startsWith("blob:")) URL.revokeObjectURL(removed.url);
        renderPending();
        resizeInput();
      });
    });
    resizeInput();
  }

  function appendMessage({ side, text, time, attachments = [] }) {
    const active = getActivePerson();
    const row = document.createElement("div");
    row.className = `msg ${side === "out" ? "you" : "them"}`;

    const avatar = document.createElement("div");
    avatar.className = `msg-avatar ${side === "out" ? "you" : accentClass(active.accent)}`;
    if (side === "out") {
      avatar.textContent = "Y";
    } else {
      paintAvatar(avatar, active.name, active.avatarDataUrl);
    }

    const content = document.createElement("div");
    content.className = "msg-content";
    const meta = document.createElement("div");
    meta.className = "msg-meta";
    const displayTime = time || formatTime();
    meta.innerHTML = `
      <span class="msg-author ${side === "out" ? "you" : ""}">${side === "out" ? "You" : active.name}</span>
      <span class="msg-time"></span>`;
    meta.querySelector(".msg-time").textContent = displayTime;

    const body = document.createElement("div");
    body.className = "msg-body";
    body.dataset.time = displayTime;
    if (text) body.textContent = text;

    attachments.forEach((item) => {
      const card = document.createElement("div");
      card.className = "attach-card";
      if (item.kind === "image" && item.url) {
        const img = document.createElement("img");
        img.src = item.url;
        img.alt = item.name || "";
        card.appendChild(img);
      } else {
        const klass = (item.name || "").toLowerCase().endsWith(".pdf") ? "pdf" : "";
        card.innerHTML = `
          <div class="file-row">
            <div class="file-icon ${klass}">${extLabel(item.name || "file")}</div>
            <div>
              <div class="file-name">${item.name || "file"}</div>
              <div class="file-size">${formatBytes(item.size || 0)}</div>
            </div>
          </div>`;
      }
      body.appendChild(card);
    });

    content.appendChild(meta);
    content.appendChild(body);
    row.appendChild(avatar);
    row.appendChild(content);
    thread.appendChild(row);
    thread.scrollTop = thread.scrollHeight;
  }

  function renderThreadFor(personId) {
    thread.innerHTML = "";
    const day = document.createElement("div");
    day.className = "day";
    day.textContent = "Today";
    thread.appendChild(day);

    const entries = state.threads[personId] || [];
    entries.forEach((entry) => {
      if (entry.role === "user") {
        appendMessage({ side: "out", text: entry.content, time: entry.time, attachments: entry.attachments || [] });
      } else if (Array.isArray(entry.bubbles) && entry.bubbles.length) {
        entry.bubbles.forEach((b) => appendMessage({ side: "in", text: b, time: entry.time }));
      } else {
        appendMessage({ side: "in", text: entry.content, time: entry.time });
      }
    });
    thread.scrollTop = thread.scrollHeight;
  }

  function pushEntry(personId, entry) {
    if (!Array.isArray(state.threads[personId])) state.threads[personId] = [];
    state.threads[personId].push(entry);
    saveState();
  }

  function switchActive(id) {
    if (id === state.activeId) return;
    state.activeId = id;
    hideTyping();
    pendingFiles.length = 0;
    renderPending();
    input.value = "";
    saveState();
    renderConvList();
    renderActiveHeader();
    renderThreadFor(id);
    resizeInput();
  }

  function showTyping() {
    const active = getActivePerson();
    typingRow.hidden = false;
    typingRow.innerHTML = `${active.name} is typing <span class="dots"><span></span><span></span><span></span></span>`;
  }

  function hideTyping() {
    typingRow.hidden = true;
    typingRow.textContent = "";
  }

  async function prepareAttachments(attachments) {
    const images = [];
    const notes = [];
    for (const item of attachments) {
      if (item.kind === "image" && item.file) {
        const dataUrl = await fileToDataUrl(item.file);
        images.push(dataUrl);
        item.url = dataUrl;
      } else if (item.file) {
        const formData = new FormData();
        formData.append("file", item.file);
        try {
          const res = await fetch("/api/extract-text", { method: "POST", body: formData });
          if (res.ok) {
            const data = await res.json();
            notes.push(`Attached file "${data.name}":\n${data.text}`);
          } else {
            notes.push(`Attached file "${item.name}" (could not read contents).`);
          }
        } catch {
          notes.push(`Attached file "${item.name}" (could not read contents).`);
        }
      }
    }
    return { images, notes };
  }

  async function askModel(personId) {
    const isActive = () => state.activeId === personId;
    const person = state.people.find((p) => p.id === personId);
    if (isActive()) showTyping();
    try {
      const apiMessages = (state.threads[personId] || []).map((m) => ({
        role: m.role,
        content: m.content,
        images: m.images || []
      }));
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contact_name: (person && person.name) || "Assistant",
          messages: apiMessages
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "Request failed");

      const parts = Array.isArray(data.replies) && data.replies.length
        ? data.replies.map((p) => String(p || "").trim()).filter(Boolean)
        : [((data.reply || "").trim() || "hmm")];

      const full = parts.join("\n\n");
      const time = formatTime();
      pushEntry(personId, { role: "assistant", content: full, images: [], time, bubbles: parts });
      renderConvList();

      for (let i = 0; i < parts.length; i += 1) {
        if (i > 0) {
          if (isActive()) showTyping();
          await sleep(700 + Math.random() * 900);
        }
        if (isActive()) {
          hideTyping();
          appendMessage({ side: "in", text: parts[i], time });
        }
        if (i < parts.length - 1) await sleep(250 + Math.random() * 350);
      }
    } catch (err) {
      if (isActive()) {
        hideTyping();
        appendMessage({ side: "in", text: "Couldn't send — try again in a sec.", time: formatTime() });
      }
      console.error(err);
    }
  }

  attachBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", () => {
    Array.from(fileInput.files || []).forEach((file) => {
      const isImage = file.type.startsWith("image/");
      pendingFiles.push({
        kind: isImage ? "image" : "file",
        name: file.name,
        size: file.size,
        url: isImage ? URL.createObjectURL(file) : null,
        file
      });
    });
    fileInput.value = "";
    renderPending();
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    const attachments = pendingFiles.splice(0, pendingFiles.length);
    renderPending();
    if ((!text && attachments.length === 0) || busy) return;

    busy = true;
    resizeInput();

    const personId = state.activeId;
    const prepared = await prepareAttachments(attachments);
    const time = formatTime();
    appendMessage({ side: "out", text, time, attachments });

    let content = text;
    if (prepared.notes.length) {
      content = [text, ...prepared.notes].filter(Boolean).join("\n\n");
    }

    pushEntry(personId, {
      role: "user",
      content: content || (prepared.images.length ? "sent a photo" : ""),
      images: prepared.images,
      time,
      attachments: attachments.map((a) => ({
        kind: a.kind,
        name: a.name,
        size: a.size,
        url: a.kind === "image" ? a.url : null
      }))
    });
    renderConvList();

    input.value = "";
    resizeInput();
    await askModel(personId);
    busy = false;
    resizeInput();
    input.focus();
  });

  input.addEventListener("input", resizeInput);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  searchInput.addEventListener("input", renderConvList);

  document.querySelectorAll(".filter-pills .pill").forEach((pill) => {
    pill.addEventListener("click", () => {
      document.querySelectorAll(".filter-pills .pill").forEach((p) => p.classList.remove("active"));
      pill.classList.add("active");
    });
  });

  document.querySelectorAll(".rail-btn").forEach((btn, i) => {
    if (i === 0) return;
    btn.addEventListener("click", (e) => e.preventDefault());
  });

  function setAppearanceButtons(appearance) {
    draftAppearance = ["light", "dark", "auto"].includes(appearance) ? appearance : "auto";
    document.getElementById("appearanceLight").classList.toggle("active", draftAppearance === "light");
    document.getElementById("appearanceDark").classList.toggle("active", draftAppearance === "dark");
    document.getElementById("appearanceAuto").classList.toggle("active", draftAppearance === "auto");
    document.getElementById("appearanceHint").textContent = APPEARANCE_HINTS[draftAppearance];
  }

  document.getElementById("appearanceLight").addEventListener("click", () => setAppearanceButtons("light"));
  document.getElementById("appearanceDark").addEventListener("click", () => setAppearanceButtons("dark"));
  document.getElementById("appearanceAuto").addEventListener("click", () => setAppearanceButtons("auto"));

  function openPersonModal(mode, personId) {
    modalMode = mode;
    editingPersonId = personId || null;
    const person = personId ? state.people.find((p) => p.id === personId) : null;

    personModalTitle.textContent = mode === "add" ? "Add person" : "Edit profile";
    nameInput.value = person ? person.name : "";
    draftAvatar = person ? person.avatarDataUrl : null;
    draftAccent = person ? person.accent : ACCENTS[state.people.length % ACCENTS.length];

    modalAvatar.className = "modal-avatar-preview " + (draftAvatar ? "" : accentClass(draftAccent));
    paintAvatar(modalAvatar, nameInput.value || "?", draftAvatar);

    appearanceSection.hidden = mode !== "edit";
    deleteBtn.hidden = !(mode === "edit" && state.people.length > 1);
    if (mode === "edit") setAppearanceButtons(state.appearance);

    personModal.classList.add("open");
    nameInput.focus();
    nameInput.select();
  }

  function closePersonModal() {
    personModal.classList.remove("open");
  }

  document.getElementById("openContact").addEventListener("click", () => openPersonModal("edit", state.activeId));
  document.getElementById("openContact").addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      openPersonModal("edit", state.activeId);
    }
  });
  document.getElementById("detailsBtn").addEventListener("click", () => openPersonModal("edit", state.activeId));
  document.getElementById("addDmBtn").addEventListener("click", () => openPersonModal("add", null));
  document.getElementById("addChatBtn").addEventListener("click", () => openPersonModal("add", null));

  document.getElementById("cancelContactBtn").addEventListener("click", closePersonModal);
  personModal.addEventListener("click", (e) => {
    if (e.target === personModal) closePersonModal();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && personModal.classList.contains("open")) closePersonModal();
  });

  document.getElementById("changePhotoBtn").addEventListener("click", () => avatarInput.click());
  document.getElementById("clearPhotoBtn").addEventListener("click", () => {
    draftAvatar = null;
    modalAvatar.className = "modal-avatar-preview " + accentClass(draftAccent);
    paintAvatar(modalAvatar, nameInput.value || "?", null);
  });

  nameInput.addEventListener("input", () => {
    if (!draftAvatar) paintAvatar(modalAvatar, nameInput.value || "?", null);
  });

  avatarInput.addEventListener("change", () => {
    const file = avatarInput.files && avatarInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      draftAvatar = reader.result;
      modalAvatar.classList.remove(...ACCENTS);
      paintAvatar(modalAvatar, nameInput.value || "?", draftAvatar);
    };
    reader.readAsDataURL(file);
    avatarInput.value = "";
  });

  document.getElementById("saveContactBtn").addEventListener("click", () => {
    const name = nameInput.value.trim();

    if (modalMode === "add") {
      const id = uid();
      state.people.push({
        id,
        name: name || `Person ${state.people.length + 1}`,
        avatarDataUrl: draftAvatar,
        accent: draftAccent
      });
      state.threads[id] = [];
      state.activeId = id;
      saveState();
      renderConvList();
      renderActiveHeader();
      renderThreadFor(id);
    } else {
      const person = state.people.find((p) => p.id === editingPersonId);
      if (person) {
        person.name = name || person.name;
        person.avatarDataUrl = draftAvatar;
      }
      state.appearance = draftAppearance;
      saveState();
      applyTheme();
      renderConvList();
      renderActiveHeader();
    }
    closePersonModal();
  });

  deleteBtn.addEventListener("click", () => {
    if (state.people.length <= 1 || !editingPersonId) return;
    const idx = state.people.findIndex((p) => p.id === editingPersonId);
    if (idx === -1) return;
    state.people.splice(idx, 1);
    delete state.threads[editingPersonId];
    if (state.activeId === editingPersonId) {
      state.activeId = state.people[0].id;
    }
    saveState();
    renderConvList();
    renderActiveHeader();
    renderThreadFor(state.activeId);
    closePersonModal();
  });

  renderConvList();
  renderActiveHeader();
  renderThreadFor(state.activeId);
  applyTheme();
  resizeInput();
</script>
</body>
</html>
